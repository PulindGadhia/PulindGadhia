name: Generate Snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Generate snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: PulindGadhia
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=22c55e&color_dots=#0d1117,#052e16,#16a34a,#22c55e,#4ade80
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=22c55e&color_dots=#0d1117,#052e16,#16a34a,#22c55e,#4ade80
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
