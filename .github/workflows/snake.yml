name: Generate Snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Generate snake
        uses: Platane/snk@v3
        with:
          github_user_name: PulindGadhia
          outputs: |
            "dist/github-contribution-grid-snake.svg?palette=github-dark&color_snake=22c55e&color_dots=%23052e16,%23065f46,%2316a34a,%2322c55e,%234ade80"
            "dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=22c55e&color_dots=%23052e16,%23065f46,%2316a34a,%2322c55e,%234ade80"

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
